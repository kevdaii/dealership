<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDM Dealership</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>JDM Dealership</h1>
  </header>

  <main>
    <section class="input-section">
      <input type="text" id="car-make" placeholder="The make of the car..." />
      <input type="text" id="car-model" placeholder="Car Model obviously..." />
      <input type="number" id="car-year" placeholder="Year of production..." />
      <button onclick="addClick()" id="add-btn">Add Car</button>
    </section>

    <div id="status" class="status">Status: Loading Data...</div>

    <div class="table-wrapper">
      <table id="buecher-table" class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Make</th>
            <th>Model</th>
            <th>Year</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          </tbody>
      </table>
    </div>
  </main>

  <script src="./app.js"></script>
</body>
</html>
